{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h5 class="fw-bold mb-4">📤 New Medical Record Upload</h5>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control"
                    placeholder="যেমন: Blood Test Report, Prescription" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3"
                    placeholder="কোনো বিশেষ নোট থাকলে লিখুন"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">File (PDF/Image)</label>
                    <input type="file" name="file" class="form-control"
                    accept=".pdf,.png,.jpg,.jpeg">
                    <small class="text-muted">Max 16MB। PDF, JPG, PNG সাপোর্টেড।</small>
                </div>
                <button type="submit" class="btn btn-primary w-100">Upload করুন</button>
                <a href="/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
